services:
  hermes-gateway:
    image: ${HERMES_IMAGE:-hermes-pinto:local}
    build:
      context: .
      args:
        PINTO_ADAPTER_REPO: ${PINTO_ADAPTER_REPO:-https://github.com/fakduai-logistics-and-digital-platform/pinto-adapter-hermes.git}
        PINTO_ADAPTER_REF: ${PINTO_ADAPTER_REF:-main}
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /root
      HERMES_HOME: /root/.hermes
      API_SERVER_KEY: ${API_SERVER_KEY:-}
      PINTO_BOT_ID: ${PINTO_BOT_ID:-}
      PINTO_API_URL: ${PINTO_API_URL:-https://api.pinto-app.com}
      PINTO_WEBHOOK_SECRET: ${PINTO_WEBHOOK_SECRET:-}
      PINTO_WEBHOOK_PATH: ${PINTO_WEBHOOK_PATH:-/plugins/pinto/webhook}
      PINTO_HOME_CHANNEL: ${PINTO_HOME_CHANNEL:-}
      PINTO_ALLOW_ALL_USERS: ${PINTO_ALLOW_ALL_USERS:-true}
      TZ: ${TZ:-UTC}
    volumes:
      - ./hermes-config:/root/.hermes
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${HERMES_GATEWAY_PORT:-8642}:8642"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8642/'); sys.exit(0 if r.status==200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  hermes-cli:
    image: ${HERMES_IMAGE:-hermes-pinto:local}
    build:
      context: .
      args:
        PINTO_ADAPTER_REPO: ${PINTO_ADAPTER_REPO:-https://github.com/fakduai-logistics-and-digital-platform/pinto-adapter-hermes.git}
        PINTO_ADAPTER_REF: ${PINTO_ADAPTER_REF:-main}
    network_mode: "service:hermes-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      HOME: /root
      HERMES_HOME: /root/.hermes
      API_SERVER_KEY: ${API_SERVER_KEY:-}
      TZ: ${TZ:-UTC}
    volumes:
      - ./hermes-config:/root/.hermes
    entrypoint: ["hermes"]
    depends_on:
      - hermes-gateway
    stdin_open: true
    tty: true

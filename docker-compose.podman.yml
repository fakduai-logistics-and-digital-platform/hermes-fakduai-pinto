services:
  hermes-gateway:
    image: ${HERMES_IMAGE:-hermes-pinto:podman}
    build:
      context: .
      dockerfile: Dockerfile.podman
      args:
        PINTO_ADAPTER_REPO: ${PINTO_ADAPTER_REPO:-https://github.com/fakduai-logistics-and-digital-platform/pinto-adapter-hermes.git}
        PINTO_ADAPTER_REF: ${PINTO_ADAPTER_REF:-main}
    env_file:
      - .env
    environment:
      HOME: /root
      HERMES_HOME: /root/.hermes
      API_SERVER_KEY: ${API_SERVER_KEY:-}
      API_SERVER_HOST: ${API_SERVER_HOST:-0.0.0.0}
      PINTO_BOT_ID: ${PINTO_BOT_ID:-}
      PINTO_API_URL: ${PINTO_API_URL:-https://api.pinto-app.com}
      PINTO_WEBHOOK_SECRET: ${PINTO_WEBHOOK_SECRET:-}
      PINTO_WEBHOOK_PATH: ${PINTO_WEBHOOK_PATH:-/plugins/pinto/webhook}
      PINTO_GENERATING_PATH: ${PINTO_GENERATING_PATH:-/v1/bots/webhook/generating}
      PINTO_GENERATING_SECRET: ${PINTO_GENERATING_SECRET:-}
      PINTO_GENERATING_TYPE: ${PINTO_GENERATING_TYPE:-text}
      PINTO_RECEIVE_MEDIA_PATH: ${PINTO_RECEIVE_MEDIA_PATH:-/v1/bots/webhook/receive-media}
      PINTO_MEDIA_UPLOAD_SECRET: ${PINTO_MEDIA_UPLOAD_SECRET:-}
      PINTO_HOME_CHANNEL: ${PINTO_HOME_CHANNEL:-}
      PINTO_ALLOW_ALL_USERS: ${PINTO_ALLOW_ALL_USERS:-true}
      GATEWAY_ALLOW_ALL_USERS: ${GATEWAY_ALLOW_ALL_USERS:-true}
      TZ: ${TZ:-Asia/Bangkok}
    volumes:
      - ./hermes-config:/root/.hermes
    ports:
      - "${HERMES_GATEWAY_PORT:-8642}:8642"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8642/health'); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  hermes-dashboard:
    image: ${HERMES_IMAGE:-hermes-pinto:podman}
    build:
      context: .
      dockerfile: Dockerfile.podman
      args:
        PINTO_ADAPTER_REPO: ${PINTO_ADAPTER_REPO:-https://github.com/fakduai-logistics-and-digital-platform/pinto-adapter-hermes.git}
        PINTO_ADAPTER_REF: ${PINTO_ADAPTER_REF:-main}
    env_file:
      - .env
    environment:
      HOME: /root
      HERMES_HOME: /root/.hermes
      HERMES_DASHBOARD: "1"
      API_SERVER_KEY: ${API_SERVER_KEY:-}
      API_SERVER_HOST: ${API_SERVER_HOST:-0.0.0.0}
      GATEWAY_ALLOW_ALL_USERS: ${GATEWAY_ALLOW_ALL_USERS:-true}
      TZ: ${TZ:-Asia/Bangkok}
    volumes:
      - ./hermes-config:/root/.hermes
    ports:
      - "${HERMES_DASHBOARD_PORT:-9119}:9119"
    command: ["hermes", "dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--insecure"]
    depends_on:
      - hermes-gateway
    restart: unless-stopped

  hermes-cli:
    image: ${HERMES_IMAGE:-hermes-pinto:podman}
    build:
      context: .
      dockerfile: Dockerfile.podman
      args:
        PINTO_ADAPTER_REPO: ${PINTO_ADAPTER_REPO:-https://github.com/fakduai-logistics-and-digital-platform/pinto-adapter-hermes.git}
        PINTO_ADAPTER_REF: ${PINTO_ADAPTER_REF:-main}
    network_mode: "service:hermes-gateway"
    env_file:
      - .env
    environment:
      HOME: /root
      HERMES_HOME: /root/.hermes
      API_SERVER_KEY: ${API_SERVER_KEY:-}
      API_SERVER_HOST: ${API_SERVER_HOST:-0.0.0.0}
      GATEWAY_ALLOW_ALL_USERS: ${GATEWAY_ALLOW_ALL_USERS:-true}
      TZ: ${TZ:-Asia/Bangkok}
    volumes:
      - ./hermes-config:/root/.hermes
    entrypoint: ["hermes"]
    depends_on:
      - hermes-gateway
    stdin_open: true
    tty: true
